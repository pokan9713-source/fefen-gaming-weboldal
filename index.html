<script>
const channelID = "UC4YuGG7PDePx_NGdrb05Yxw";
const videoContainer = document.getElementById("video-container");

async function loadVideos() {
    try {
        const rssURL =
            `https://www.youtube.com/feeds/videos.xml?channel_id=${channelID}`;

        const apiURL =
            `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssURL)}`;

        const response = await fetch(apiURL);
        const data = await response.json();

        if (!data.items || data.items.length === 0) {
            videoContainer.innerHTML =
                "<p class='loading'>Nincs elérhető videó.</p>";
            return;
        }

        videoContainer.innerHTML = "";

        data.items.slice(0, 6).forEach(video => {

            const videoID = video.guid.replace("yt:video:", "");

            const card = document.createElement("a");

            card.className = "video-card";
            card.href =
                `https://www.youtube.com/watch?v=${videoID}`;
            card.target = "_blank";
            card.rel = "noopener";

            card.innerHTML = `
                <div class="thumbnail">

                    <img
                        src="https://i.ytimg.com/vi/${videoID}/hqdefault.jpg"
                        alt="${video.title}"
                        loading="lazy"
                    >

                    <div class="play-button">
                        ▶
                    </div>

                </div>

                <div class="video-info">

                    <h3>${video.title}</h3>

                    <p>
                        🎮 FefeN Gaming · YouTube
                    </p>

                </div>
            `;

            videoContainer.appendChild(card);
        });

    } catch (error) {

        console.error(error);

        videoContainer.innerHTML =
            "<p class='loading'>❌ A videók betöltése nem sikerült.</p>";
    }
}

loadVideos();
</script>
<section class="section videos" id="videok">

    <div class="section-title">
        <h2>📺 Legújabb videóim</h2>
        <p>FefeN Gaming legújabb YouTube-videói</p>
    </div>

    <div id="video-container" class="video-grid">
        <p class="loading">⏳ Videók betöltése...</p>
    </div>

</section>
