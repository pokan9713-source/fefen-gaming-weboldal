<!doctype html>
<html lang="hu">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FEFEX | Gaming csatorna</title>

  <style>
    :root {
      --bg: #0b0b10;
      --card: #15151e;
      --white: #f8f8fc;
      --muted: #b0b0c0;
      --red: #ff3155;
      --cyan: #58e4ff;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--white);
      font-family: Arial, Helvetica, sans-serif;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .wrap {
      width: min(1150px, calc(100% - 40px));
      margin: auto;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(11, 11, 16, 0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,.08);
    }

    .nav {
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 25px;
    }

    .logo {
      font-size: 1.35rem;
      font-weight: 900;
      letter-spacing: .1em;
    }

    .logo span { color: var(--red); }

    nav {
      display: flex;
      gap: 25px;
      color: var(--muted);
    }

    nav a:hover { color: white; }

    .btn {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      padding: 12px 18px;
      background: var(--red);
      border: 1px solid var(--red);
      color: white;
      font-weight: bold;
      transition: .2s;
    }

    .btn:hover {
      transform: translateY(-2px);
      background: #ff5975;
    }

    .btn.outline {
      background: transparent;
      border-color: rgba(255,255,255,.25);
    }

    .btn.outline:hover { border-color: var(--cyan); }

    .hero {
      min-height: 590px;
      display: grid;
      align-content: center;
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: "▶";
      position: absolute;
      right: 5%;
      top: 5%;
      color: rgba(255,255,255,.04);
      font-size: min(35vw, 380px);
      font-weight: bold;
      z-index: -1;
    }

    .tag {
      color: var(--cyan);
      font-weight: bold;
      font-size: .76rem;
      letter-spacing: .14em;
      text-transform: uppercase;
    }

    h1 {
      max-width: 800px;
      margin: 18px 0;
      font-size: clamp(3.2rem, 8vw, 6.5rem);
      line-height: .93;
      letter-spacing: -.07em;
    }

    h1 span { color: var(--red); }

    .lead {
      max-width: 580px;
      color: var(--muted);
      font-size: 1.1rem;
      line-height: 1.6;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 28px;
    }

    .stats {
      display: flex;
      gap: 30px;
      margin-top: 55px;
      color: var(--muted);
      font-size: .85rem;
    }

    .stats b {
      display: block;
      color: white;
      font-size: 1.3rem;
    }

    section { padding: 85px 0; }

    .title-row {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 28px;
    }

    h2 {
      margin: 0;
      font-size: clamp(2rem, 4vw, 3.2rem);
      letter-spacing: -.06em;
      line-height: 1;
    }

    .more {
      color: var(--cyan);
      font-weight: bold;
      white-space: nowrap;
    }

    .featured {
      display: grid;
      grid-template-columns: 1.3fr .7fr;
      background: var(--card);
      border: 1px solid rgba(255,255,255,.1);
    }

    .cover {
      min-height: 330px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #153b56, #48205b 55%, #df3458);
    }

    .play {
      width: 78px;
      height: 78px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: var(--red);
      font-size: 1.4rem;
      padding-left: 4px;
      box-shadow: 0 0 35px rgba(255,49,85,.7);
    }

    .featured-text {
      padding: 45px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .episode {
      color: var(--cyan);
      font-size: .75rem;
      font-weight: bold;
      letter-spacing: .12em;
      text-transform: uppercase;
    }

    .featured h3 {
      margin: 12px 0;
      font-size: 2rem;
      line-height: 1.1;
    }

    .featured p {
      color: var(--muted);
      margin: 0 0 24px;
      line-height: 1.6;
    }

    .videos {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
    }

    .video {
      transition: .2s;
    }

    .video:hover {
      transform: translateY(-5px);
    }

    .thumb {
      height: 180px;
      display: grid;
      place-items: center;
      position: relative;
      font-size: 1.5rem;
      background: linear-gradient(135deg, #008fa5, #283a89 55%, #0a1123);
    }

    .thumb.two {
      background: linear-gradient(135deg, #ef9f18, #c43e35 55%, #37112c);
    }

    .thumb.three {
      background: linear-gradient(135deg, #6c44c7, #e14e9a 55%, #f1ab45);
    }

    .duration {
      position: absolute;
      right: 9px;
      bottom: 9px;
      padding: 3px 6px;
      background: rgba(0,0,0,.8);
      font-size: .75rem;
      font-weight: bold;
    }

    .video h3 {
      margin: 12px 0 4px;
      font-size: 1.05rem;
      line-height: 1.3;
    }

    .video p {
      margin: 0;
      color: var(--muted);
      font-size: .85rem;
    }

    .about {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 50px;
      align-items: center;
      padding: 70px;
      background: linear-gradient(120deg, #171723, #21182c);
      border: 1px solid rgba(255,255,255,.1);
    }

    .about p {
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.7;
    }

    .socials {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 20px;
    }

    .social {
      padding: 10px 13px;
      border: 1px solid rgba(255,255,255,.2);
      font-weight: bold;
      font-size: .9rem;
    }

    .social:hover {
      border-color: var(--cyan);
      color: var(--cyan);
    }

    footer {
      padding: 25px 0;
      color: var(--muted);
      border-top: 1px solid rgba(255,255,255,.08);
      font-size: .85rem;
    }

    .foot {
      display: flex;
      justify-content: space-between;
    }

    @media (max-width: 720px) {
      .wrap { width: min(100% - 30px, 1150px); }
      nav { display: none; }
      .featured, .about { grid-template-columns: 1fr; }
      .videos { grid-template-columns: 1fr; }
      .about { padding: 30px; gap: 25px; }
      .featured-text { padding: 28px; }
      .cover { min-height: 230px; }
      .thumb { height: 210px; }
      .stats { gap: 17px; }
      .foot { flex-direction: column; gap: 8px; }
    }
  </style>
</head>
