<!DOCTYPE html>
<html lang="hu"><head><meta charset="UTF-8"><title>Busz Játék</title>
<style>
body{margin:0;background:#333;font-family:Arial;color:#fff;text-align:center}
canvas{background:#6ec6ff;display:block;margin:20px auto;border:4px solid #fff}
</style></head><body>
<h2>🚌 Busz Játék</h2><p>Bal/Jobb nyíl: mozgatás</p><div id="s">Pont: 0</div>
<canvas id="c" width="500" height="700"></canvas>
<script>
const c=document.getElementById('c'),x=c.getContext('2d');
let bus={x:220,y:610,w:60,h:80},pts=0,arr=[];
onkeydown=e=>{if(e.key=='ArrowLeft')bus.x=Math.max(100,bus.x-20);
if(e.key=='ArrowRight')bus.x=Math.min(340,bus.x+20);}
setInterval(()=>arr.push({x:110+Math.random()*280,y:-20}),800);
function loop(){
x.clearRect(0,0,500,700);
x.fillStyle='#666';x.fillRect(100,0,300,700);
x.fillStyle='yellow';x.fillRect(bus.x,bus.y,bus.w,bus.h);
for(let i=arr.length-1;i>=0;i--){
 let p=arr[i];p.y+=4;
 x.beginPath();x.fillStyle='red';x.arc(p.x,p.y,10,0,7);x.fill();
 if(p.x>bus.x&&p.x<bus.x+bus.w&&p.y>bus.y&&p.y<bus.y+bus.h){arr.splice(i,1);pts++;s.textContent='Pont: '+pts;}
 else if(p.y>700)arr.splice(i,1);
}
requestAnimationFrame(loop)}
loop();
</script></body></html>
